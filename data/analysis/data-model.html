<style>

  .tbl .idx { color: #bc8cff; font-size: 9px; }

  /* Layer colors */

  .tbl-header.l2 { background: #4f46e5; color: #fff; }
  .tbl-header.l3 { background: #da3633; color: #fff; }
</style>
</head>

<h1>VASSAL Module Corpus — Data Model</h1>
<p class="subtitle">Three-Layer Architecture: Raw → Structural → Semantic &nbsp;|&nbsp; 18 tables &nbsp;|&nbsp; SQLite (better-sqlite3)</p>

  <div class="legend-item"><span style="color:#f0c040">🔑</span> Primary Key</div>
  <div class="legend-item"><span style="color:#58a6ff">→</span> Foreign Key</div>
</div>
